<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
        <link rel="stylesheet" type="text/css" href="/css/style.css">
        <title>Login - Escola360</title>
    </head>

    <body>
        
        <header class="cabecalho">

            <div class="logo">

                <img src="/img/favicon.png" alt="Logo da Escola360">
                <span><a href="/index.html">Escola360</a></span>

            </div>
            
            <ul class="cabecalho-nav">
                <li><a href="/paginas/sobre-nos.html">Sobre nós</a></li>
                <li><a href="/paginas/funcionalidades.html">Funcionalidades</a></li>
                <li><a href="/paginas/suporte.html">Suporte</a></li>
            </ul>

        </header>
        
        <main>
            <section class="login-section">
                <div class="login-card">
                    <h2>Login</h2>
                    <form action="#" method="POST">
                    <div>
                        <label for="email">E-mail</label>
                        <input type="text" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div>
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                    </div>
                    <div>
                        <label>
                        <input type="checkbox" name="lembrar"> Lembrar-me
                        </label>
                        <a href="#">Esqueceu a senha?</a>
                    </div>
                    <button type="submit">Entrar</button>
                    </form>
                    
                </div>
            </section>
        </main>


        <footer class = "rodape">
            <p>&copy; 2026 Escola360 - Todos os direitos reservados.</p>

        </footer>

    </body>

</html>
